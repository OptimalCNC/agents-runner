<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agents Runner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-left">
        <svg class="navbar-logo" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="7" fill="url(#logo-grad)" />
          <path d="M8 19l4-10 4 10M9.5 16h5M18 9v10" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="logo-grad" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#818cf8"/><stop offset="1" stop-color="#6366f1"/></linearGradient></defs>
        </svg>
        <span class="navbar-title">Agents Runner</span>
        <span class="navbar-version">v0.1</span>
      </div>
      <div class="navbar-right">
        <div class="conn-status" id="connectionStatus">
          <span class="conn-dot" id="connectionDot"></span>
          <span class="conn-label" id="connectionText">Connecting&hellip;</span>
        </div>
        <div class="runtime-badge" id="runtimeBadge" title="Loading runtime info&hellip;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6v12a3 3 0 1 0 3-3H6a3 3 0 1 0 3 3V6a3 3 0 1 0-3 3h12a3 3 0 1 0-3-3"/></svg>
          <span id="runtimeText">Checking&hellip;</span>
        </div>
        <button class="btn btn-primary" id="newRunButton" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Run
        </button>
      </div>
    </nav>

    <div class="app-layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h2>Runs</h2>
          <span class="badge" id="runCountBadge">0</span>
        </div>
        <div class="runs-list" id="runsList">
          <div class="empty-state">
            <div class="empty-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg>
            </div>
            <p class="empty-title">No runs yet</p>
            <p class="empty-desc">Click "New Run" to get started</p>
          </div>
        </div>
      </aside>

      <main class="main-content" id="mainContent">
        <div class="empty-state main-empty">
          <div class="empty-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          </div>
          <p class="empty-title">No run selected</p>
          <p class="empty-desc">Launch a run or select one from the sidebar to inspect agent output.</p>
        </div>
      </main>
    </div>

    <!-- New Run Drawer -->
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <aside class="drawer" id="newRunDrawer">
      <div class="drawer-header">
        <h2>New Run</h2>
        <button class="btn-icon" id="closeDrawerButton" type="button" aria-label="Close drawer">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="runForm" class="drawer-body">
        <div class="form-section">
          <label class="form-label">Mode</label>
          <div class="segmented">
            <button class="seg-btn is-active" data-mode="repeated" type="button">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
              Repeated
            </button>
            <button class="seg-btn" data-mode="generated" type="button">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              Generated
            </button>
          </div>
        </div>

        <div class="form-section">
          <label class="form-label" for="projectPath">Project Folder</label>
          <div class="input-with-btns">
            <input id="projectPath" name="projectPath" placeholder="/path/to/project" required />
            <button class="btn btn-ghost btn-sm" id="browseProjectButton" type="button">Browse</button>
            <button class="btn-icon btn-inspect" id="inspectProjectButton" type="button" title="Re-inspect git repository" aria-label="Re-inspect">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
          </div>
          <span class="form-hint" id="projectInspectStatus"></span>
          <div class="inspect-box" id="projectInspectBox" hidden>
            <div class="inspect-row"><span class="inspect-label">Repo root</span><span class="inspect-value" id="inspectRepoRoot"></span></div>
            <div class="inspect-row"><span class="inspect-label">Branch</span><span class="inspect-value" id="inspectBranch"></span></div>
            <div class="inspect-row"><span class="inspect-label">HEAD</span><span class="inspect-value mono" id="inspectHead"></span></div>
          </div>
        </div>

        <div class="form-section">
          <label class="form-label" for="worktreeRoot">Worktree Root</label>
          <div class="input-with-btn">
            <input id="worktreeRoot" name="worktreeRoot" placeholder="Defaults to project parent" />
            <button class="btn btn-ghost btn-sm" id="browseWorktreeButton" type="button">Browse</button>
          </div>
        </div>

        <div class="form-grid-2">
          <div class="form-section">
            <label class="form-label" for="runCount">Run Count</label>
            <input id="runCount" name="runCount" min="1" max="50" type="number" value="10" required />
          </div>
          <div class="form-section">
            <label class="form-label form-label-with-hint" for="concurrency">
              Concurrency
              <span class="hint-icon" id="concurrencyHint" data-tooltip="Max agents running in parallel. Cannot exceed run count." aria-label="Concurrency help">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
              </span>
            </label>
            <input id="concurrency" name="concurrency" min="1" max="50" type="number" value="10" required />
          </div>
        </div>

        <div class="form-section" id="promptGroup">
          <label class="form-label" for="prompt">Prompt</label>
          <textarea id="prompt" name="prompt" rows="8" placeholder="Describe the task to repeat across all agents."></textarea>
        </div>

        <div class="form-section" id="taskPromptGroup" hidden>
          <label class="form-label" for="taskPrompt">Task Generation Prompt</label>
          <textarea id="taskPrompt" name="taskPrompt" rows="8" placeholder="Describe how Codex should split work into independent tasks."></textarea>
        </div>

        <div class="form-divider">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Execution Options
        </div>

        <div class="form-grid-2">
          <div class="form-section">
            <label class="form-label" for="baseRef">Base Ref</label>
            <input id="baseRef" name="baseRef" placeholder="Current HEAD" />
          </div>
          <div class="form-section">
            <label class="form-label" for="model">Model</label>
            <input id="model" name="model" placeholder="Codex default" />
          </div>
          <div class="form-section">
            <label class="form-label" for="reasoningEffort">Reasoning Effort</label>
            <select id="reasoningEffort" name="reasoningEffort">
              <option value="">Default</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="form-section">
            <label class="form-label" for="sandboxMode">Sandbox</label>
            <select id="sandboxMode" name="sandboxMode">
              <option value="workspace-write">workspace-write</option>
              <option value="read-only">read-only</option>
              <option value="danger-full-access">danger-full-access</option>
            </select>
          </div>
          <div class="form-section">
            <label class="form-label" for="approvalPolicy">Approval Policy</label>
            <select id="approvalPolicy" name="approvalPolicy">
              <option value="never">never</option>
              <option value="on-request">on-request</option>
              <option value="on-failure">on-failure</option>
              <option value="untrusted">untrusted</option>
            </select>
          </div>
        </div>

        <div class="form-grid-2">
          <label class="toggle-field">
            <input id="networkAccessEnabled" name="networkAccessEnabled" type="checkbox" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span>Network access</span>
          </label>
          <label class="toggle-field">
            <input id="webSearchMode" name="webSearchMode" type="checkbox" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span>Web search</span>
          </label>
        </div>

        <div class="drawer-footer">
          <button class="btn btn-ghost" id="resetFormButton" type="button">Reset</button>
          <button class="btn btn-primary" id="submitButton" type="submit">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Start Run
          </button>
        </div>
      </form>
    </aside>

    <!-- Folder Browser Dialog -->
    <dialog id="browserDialog" class="dialog">
      <form method="dialog" class="dialog-shell">
        <div class="dialog-header">
          <h3 id="browserTitle">Choose Folder</h3>
          <button class="btn-icon" type="submit" aria-label="Close">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="dialog-toolbar">
          <button class="btn btn-ghost btn-sm" id="browserUpButton" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            Up
          </button>
          <code class="browser-path" id="browserCurrentPath"></code>
          <button class="btn btn-primary btn-sm" id="browserSelectButton" type="button">Select</button>
        </div>
        <div id="browserList" class="browser-list"></div>
      </form>
    </dialog>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
